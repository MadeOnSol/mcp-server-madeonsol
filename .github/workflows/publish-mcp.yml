name: Publish to MCP Registry

# Publishes server.json to registry.modelcontextprotocol.io.
# The npm package (mcp-server-madeonsol) is published separately via the main
# release flow, so this workflow only does the MCP-registry publish step.
# Auth is GitHub OIDC — no secrets needed; the io.github.madeonsol/* namespace
# is verified automatically because this workflow runs in madeonsol's repo.

on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC authentication
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
